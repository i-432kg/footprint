name: Deploy STG to Railway

on:
  push:
    branches:
      - develop
  repository_dispatch:
    types:
      - frontend-pushed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-check:
    runs-on: ubuntu-24.04
    environment: stg
    env:
      FRONTEND_REF_FOR_DEPLOY: ${{ github.event.client_payload.frontend_ref || vars.FRONTEND_REF }}
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: footprint_test
          MYSQL_USER: footprint_test
          MYSQL_PASSWORD: footprint_test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout backend repository
        uses: actions/checkout@v5

      - name: Validate repository variables
        run: |
          test -n "${{ vars.FRONTEND_REPO }}" || (echo "FRONTEND_REPO is not set" && exit 1)
          test -n "$FRONTEND_REF_FOR_DEPLOY" || (echo "FRONTEND_REF is not set" && exit 1)
          echo "Required repository variables are set"

      - name: Validate frontend repository secret
        env:
          FRONTEND_REPO_PAT: ${{ secrets.FRONTEND_REPO_PAT }}
        run: |
          test -n "$FRONTEND_REPO_PAT" || (echo "FRONTEND_REPO_PAT is not set" && exit 1)
          echo "Required frontend repository secret is set"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run backend tests
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/footprint_test
          SPRING_DATASOURCE_USERNAME: footprint_test
          SPRING_DATASOURCE_PASSWORD: footprint_test
        run: ./gradlew test

      - name: Checkout frontend repository
        uses: actions/checkout@v5
        with:
          repository: ${{ vars.FRONTEND_REPO }}
          ref: ${{ env.FRONTEND_REF_FOR_DEPLOY }}
          token: ${{ secrets.FRONTEND_REPO_PAT }}
          path: frontend

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Build frontend for STG
        working-directory: frontend
        run: npm run build:stg

  deploy:
    needs: quality-check
    runs-on: ubuntu-24.04
    environment: stg
    env:
      FRONTEND_REF_FOR_DEPLOY: ${{ github.event.client_payload.frontend_ref || vars.FRONTEND_REF }}

    steps:
      - name: Checkout backend repository
        uses: actions/checkout@v5

      - name: Validate repository variables
        run: |
          test -n "${{ vars.FRONTEND_REPO }}" || (echo "FRONTEND_REPO is not set" && exit 1)
          test -n "$FRONTEND_REF_FOR_DEPLOY" || (echo "FRONTEND_REF is not set" && exit 1)
          test -n "${{ vars.RAILWAY_SERVICE }}" || (echo "RAILWAY_SERVICE is not set" && exit 1)
          echo "Required repository variables are set"

      - name: Validate required secrets
        env:
          FRONTEND_REPO_PAT: ${{ secrets.FRONTEND_REPO_PAT }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          test -n "$FRONTEND_REPO_PAT" || (echo "FRONTEND_REPO_PAT is not set" && exit 1)
          test -n "$RAILWAY_TOKEN" || (echo "RAILWAY_TOKEN is not set" && exit 1)
          echo "Required secrets are set"

      - name: Checkout frontend repository
        uses: actions/checkout@v5
        with:
          repository: ${{ vars.FRONTEND_REPO }}
          ref: ${{ env.FRONTEND_REF_FOR_DEPLOY }}
          token: ${{ secrets.FRONTEND_REPO_PAT }}
          path: frontend

      - name: Write deploy summary
        run: |
          FRONTEND_COMMIT="$(git -C frontend rev-parse HEAD)"
          {
            echo "## Deploy Summary"
            echo ""
            echo "| Key | Value |"
            echo "|---|---|"
            echo "| Backend commit | \`${GITHUB_SHA}\` |"
            echo "| Frontend ref | \`${FRONTEND_REF_FOR_DEPLOY}\` |"
            echo "| Frontend commit | \`${FRONTEND_COMMIT}\` |"
            echo "| Environment | \`stg\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service "${{ vars.RAILWAY_SERVICE }}"
