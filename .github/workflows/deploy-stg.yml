name: Deploy STG to Railway

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  deploy-stg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout backend repository
        uses: actions/checkout@v4

      - name: Checkout frontend repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.FRONTEND_REPO }}
          ref: develop
          path: frontend
          token: ${{ secrets.FRONTEND_REPO_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copy frontend build artifacts into backend static resources
        run: |
          rm -rf src/main/resources/static/assets
          mkdir -p src/main/resources/static
          cp -R frontend/dist/* src/main/resources/static/

      - name: Verify copied frontend assets
        run: |
          find src/main/resources/static -maxdepth 3 -type f | sort

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up