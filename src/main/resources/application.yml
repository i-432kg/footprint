spring:
  profiles:
    active: local # デフォルトはローカル起動用
  application:
    name: footprint
  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration

# 共通のアプリ設定
app:
  frontend:
    entries:
      login:
        js: ""
      map:
        js: ""
      mypage:
        js: ""
      search:
        js: ""
      timeline:
        js: ""

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  type-handlers-package: jp.i432kg.footprint.infrastructure.datasource.typehandler
  mapper-locations: classpath*:jp/i432kg/footprint/infrastructure/datasource/mapper/**/*.xml
