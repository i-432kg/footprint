spring:
  profiles:
    active: local # デフォルトはローカル起動用

  application:
    name: footprint

  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  sql:
    init:
      # DBスキーマはFlywayで管理するため、schema.sql/data.sqlは実行しない。
      mode: never

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

app:
  ogp:
    site-base-url: ${APP_OGP_SITE_BASE_URL:}
    site-name: Footprint
    title: "Footprint - 写真と場所で日常を残す投稿アプリ"
    description: "Footprint は、写真付きの投稿をタイムラインと地図の両方から振り返れる Web アプリケーションです。"
    type: website
    image-path: /ogp.png
    twitter-card: summary_large_image

  frontend:
    public-base-url: ""

    entries:
      about:
        js: ""
      login:
        js: ""
      map:
        js: ""
      mypage:
        js: ""
      privacy:
        js: ""
      search:
        js: ""
      terms:
        js: ""
      timeline:
        js: ""

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  type-handlers-package: jp.i432kg.footprint.infrastructure.datasource.typehandler
  mapper-locations: classpath*:jp/i432kg/footprint/infrastructure/datasource/mapper/**/*.xml

logging:
  pattern:
    # text ログ出力時のレベル表示へ traceId を載せる設定。structured logging(JSON) では直接使われない。
    level: "%5p [traceId:%X{traceId}]"
  structured:
    json:
      add:
        environment: ${app.logging.environment}
      stacktrace:
        root: first
        max-length: 8192
        include-common-frames: true
        include-hashes: true
