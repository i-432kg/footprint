server:
  port: 8080

spring:
  application:
    name: footprint
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      schema-locations: classpath:sql/schema.sql
      data-locations: classpath:sql/data.sql
      encoding: UTF-8

mybatis:
  type-handlers-package: jp.i432kg.footprint.infrastructure.datasource.typehandler
  configuration:
    map-underscore-to-camel-case: true # DBの項目名(user_id)をJavaのフィールド(userId)に自動変換
