spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none

app:
  storage:
    type: LOCAL
    local:
      root-dir: storage/local
    image-base-url: /images/

  local-seed:
    enabled: false
    cleanup-only: false
    cleanup-before-seed: false
    test-password: ${APP_LOCAL_SEED_TEST_PASSWORD}
    active-user-count: 1
    inactive-user-count: 1
    email-prefix: local_seed_user_
    source-root-dir: seed-source
    manifest-path: seed-source/manifest/seed-images.json

  frontend:
    entries:
      login:
        js: "http://localhost:5173/src/entries/login/main.js"
        css: [ ]
      map:
        js: "http://localhost:5173/src/entries/map/main.js"
        css: [ ]
      mypage:
        js: "http://localhost:5173/src/entries/mypage/main.js"
        css: [ ]
      search:
        js: "http://localhost:5173/src/entries/search/main.js"
        css: [ ]
      timeline:
        js: "http://localhost:5173/src/entries/timeline/main.js"
        css: [ ]
