# ローカル環境で JSON 構造化ログをファイル出力したいときだけ重ねる補助 profile。
# 例: `SPRING_PROFILES_ACTIVE=local,local-logfile`
logging:
  file:
    name: logs/footprint-local-${PID}.json
  structured:
    format:
      file: logstash
  logback:
    rollingpolicy:
      file-name-pattern: logs/footprint-local-${PID}.%d{yyyy-MM-dd}.%i.json.gz
      max-file-size: 10MB
      max-history: 14
      total-size-cap: 1GB
