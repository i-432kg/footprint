spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/footprint_stg}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

# STG環境はS3を使用（バケット名などは環境変数で注入）
app:
  logging:
    environment: stg
  storage:
    type: ${APP_STORAGE_TYPE:S3}
    image-csp-allow-origins: ${APP_STORAGE_IMAGE_CSP_ALLOW_ORIGINS:}

    # LOCAL用。S3利用時は実質未使用
    image-base-url: ${APP_STORAGE_IMAGE_BASE_URL:/images/}

    s3:
      endpoint: ${APP_STORAGE_S3_ENDPOINT:}
      bucket-name: ${APP_STORAGE_S3_BUCKET_NAME:}
      region: ${APP_STORAGE_S3_REGION:ap-northeast-1}
      access-key: ${APP_STORAGE_S3_ACCESS_KEY:}
      secret-key: ${APP_STORAGE_S3_SECRET_KEY:}
      path-style: ${APP_STORAGE_S3_PATH_STYLE:false}
      presigned-get-expire-minutes: ${APP_STORAGE_S3_PRESIGNED_GET_EXPIRE_MINUTES:1}

  stg-seed:
    enabled: ${APP_STG_SEED_ENABLED:false}
    cleanup-only: ${APP_STG_SEED_CLEANUP_ONLY:false}
    cleanup-before-seed: ${APP_STG_SEED_CLEANUP_BEFORE_SEED:false}
    test-password: ${APP_STG_SEED_TEST_PASSWORD:}
    email-prefix: ${APP_STG_SEED_EMAIL_PREFIX:stg_seed_user_}
    source-bucket-name: ${APP_STG_SEED_SOURCE_BUCKET_NAME:}
    manifest-object-key: ${APP_STG_SEED_MANIFEST_OBJECT_KEY:seed-source/manifest/seed-images.json}

  frontend:
    vite:
      manifest-location: classpath:/static/manifest.json
