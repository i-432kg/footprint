spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/footprint_stg}
    username: ${SPRING_DATASOURCE_USERNAME:stg_user}
    password: ${SPRING_DATASOURCE_PASSWORD:stg_pass}
  sql:
    init:
      mode: never # STG以降は自動初期化しない（手動またはマイグレーションツール）
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

# STG環境はS3を使用（バケット名などは環境変数で注入）
app:
  storage:
    type: ${APP_STORAGE_TYPE:S3}
    s3:
      bucket-name: ${APP_STORAGE_S3_BUCKET_NAME:footprint-stg-bucket}
      region: ${APP_STORAGE_S3_REGION:ap-northeast-1}
    image-base-url: ${APP_STORAGE_IMAGE_BASE_URL:https://stg-cdn.example.com/}

  frontend:
    vite:
      manifest-location: classpath:/static/manifest.json