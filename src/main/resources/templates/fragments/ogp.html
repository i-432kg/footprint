<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<body>
<th:block th:fragment="meta">
    <meta name="description" th:content="${ogp.description}">
    <meta property="og:site_name" th:content="${ogp.siteName}">
    <meta property="og:title" th:content="${ogp.title}">
    <meta property="og:description" th:content="${ogp.description}">
    <meta property="og:type" th:content="${ogp.type}">
    <meta property="og:url" th:content="${ogp.url}">
    <meta property="og:image" th:content="${ogp.imageUrl}">
    <meta property="og:locale" content="ja_JP">
    <meta name="twitter:card" th:content="${ogp.twitterCard}">
    <meta name="twitter:title" th:content="${ogp.title}">
    <meta name="twitter:description" th:content="${ogp.description}">
    <meta name="twitter:image" th:content="${ogp.imageUrl}">
</th:block>
</body>
</html>
