spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/footprint_prod
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  sql:
    init:
      mode: never

# 本番環境設定
app:
  storage:
    type: S3
    s3:
      bucket-name: footprint-prod-bucket
      region: ap-northeast-1
    image-base-url: https://cdn.example.com/

  frontend:
    vite:
      manifest-location: classpath:/static/manifest.json