services:
  mysql:
    image: mysql:8.4
    container_name: footprint-mysql-local
    environment:
      MYSQL_DATABASE: footprint_local
      MYSQL_USER: footprint
      MYSQL_PASSWORD: footprint
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_local_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mysql_local_data:
